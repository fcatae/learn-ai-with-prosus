<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #4ecca3; letter-spacing: 4px; }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      color: #aaa;
    }
    #scoreboard span { color: #4ecca3; font-size: 1.2rem; font-weight: bold; }
    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 20px #4ecca355;
    }
    #message {
      margin-top: 18px;
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 1px;
      min-height: 1.4em;
    }
    #message b { color: #4ecca3; }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    SCORE: <span id="score">0</span>&nbsp;&nbsp;&nbsp;BEST: <span id="best">0</span>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <p id="message"><b>Press any arrow key</b> to start</p>

  <script>
    const COLS = 20, ROWS = 20, TILE = 20;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('message');

    let snake, dir, nextDir, food, score, best, loop, running, dead;

    function rand(n) { return Math.floor(Math.random() * n); }

    function spawnFood() {
      const occupied = new Set(snake.map(s => s.x + ',' + s.y));
      let f;
      do { f = { x: rand(COLS), y: rand(ROWS) }; }
      while (occupied.has(f.x + ',' + f.y));
      return f;
    }

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      dead = false;
      running = false;
      scoreEl.textContent = 0;
      food = spawnFood();
      clearInterval(loop);
      draw();
      msgEl.innerHTML = '<b>Press any arrow key</b> to start';
    }

    function start() {
      if (running) return;
      running = true;
      msgEl.textContent = '';
      loop = setInterval(tick, 120);
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        food = spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      clearInterval(loop);
      dead = true;
      running = false;
      draw();
      msgEl.innerHTML = `Game over! Score: <b>${score}</b> — <b>Press R</b> to restart`;
    }

    function draw() {
      // Background
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid (subtle)
      ctx.strokeStyle = '#1f2d4a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * TILE, 0); ctx.lineTo(x * TILE, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * TILE); ctx.lineTo(canvas.width, y * TILE); ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#e94560';
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(food.x * TILE + TILE / 2, food.y * TILE + TILE / 2, TILE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = dead
          ? `rgba(180,40,40,${0.4 + 0.6 * ratio})`
          : `rgba(78,204,163,${0.35 + 0.65 * ratio})`;
        if (i === 0) {
          ctx.shadowColor = dead ? '#e94560' : '#4ecca3';
          ctx.shadowBlur = 12;
        } else {
          ctx.shadowBlur = 0;
        }
        const pad = i === 0 ? 1 : 2;
        ctx.fillRect(seg.x * TILE + pad, seg.y * TILE + pad, TILE - pad * 2, TILE - pad * 2);
      });
      ctx.shadowBlur = 0;
    }

    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp:    { x: 0,  y: -1 },
        ArrowDown:  { x: 0,  y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x: 1,  y:  0 },
      };
      if (e.key === 'r' || e.key === 'R') { init(); return; }
      if (!keys[e.key]) return;
      e.preventDefault();
      const d = keys[e.key];
      // Prevent 180-degree turn
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      if (!running && !dead) start();
    });

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;
    setInterval(() => localStorage.setItem('snakeBest', best), 2000);

    init();
  </script>
</body>
</html>
